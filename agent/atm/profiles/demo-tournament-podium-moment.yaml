# Run-specific profile for tournament-podium-moment
# Not reusing Lightning E2E — dedicated tournament E2E + podium gates
gates:
  - id: gate.discovery.api
    title: API and data contract probed before implementation
    severity: critical
    kind: manual
  - id: gate.discovery.routes
    title: Routes and navigation checked
    severity: major
    kind: manual
  - id: gate.implementation.migration
    title: Required migrations exist
    severity: critical
    kind: file_exists_or_note
  - id: gate.build.production
    title: Production build passes (web)
    severity: critical
    kind: command
    command: cd product/apps/web && npx vite build
  - id: gate.e2e.tournament-podium
    title: Tournament Podium Moment E2E passes
    severity: critical
    kind: command
    command: node product/scripts/e2e-tournament-podium-moment.mjs
  - id: gate.screenshots.desktop
    title: Desktop screenshots exist (podium feature)
    severity: critical
    kind: screenshot_set
    min_count: 4
    min_size_kb: 80
  - id: gate.screenshots.mobile
    title: Mobile screenshot exists
    severity: critical
    kind: screenshot_set
    min_count: 1
    min_size_kb: 60
  - id: gate.visual.review
    title: Screenshots reviewed
    severity: critical
    kind: manual
    evidence:
      required: [file]
  - id: gate.evidence.package
    title: Evidence package complete
    severity: critical
    kind: file_exists
    paths:
      - agent/atm/runs/<run-id>/evidence/summary.md
      - agent/atm/runs/<run-id>/evidence/atm-export.json
  - id: review.self.text
    title: Fresh-context text reviewer completed
    severity: critical
    kind: file_exists_or_note
    paths:
      - agent/atm/runs/<run-id>/evidence/reviewer-verdict.md
      - agent/atm/runs/<run-id>/evidence/reviewer-quality-score.md
      - agent/atm/runs/<run-id>/evidence/reviewer-fix-contract.md
  - id: review.self.vision
    title: Vision review completed or explicitly skipped
    severity: major
    kind: file_exists_or_note
    paths:
      - agent/atm/runs/<run-id>/evidence/vision-review.md
  - id: review.codex.text
    title: Codex fresh-context text review completed (blocking)
    severity: critical
    kind: file_exists
    paths:
      - agent/atm/runs/<run-id>/evidence/codex-reviewer-verdict.md
  - id: review.codex.vision
    title: Codex vision review completed for demo screenshots (blocking)
    severity: critical
    kind: file_exists
    paths:
      - agent/atm/runs/<run-id>/evidence/codex-vision-review.md
  - id: review.self.fix_response
    title: Reviewer blocking findings fixed or explicitly accepted
    severity: critical
    kind: file_exists_or_note
    paths:
      - agent/atm/runs/<run-id>/evidence/reviewer-fix-response.md
